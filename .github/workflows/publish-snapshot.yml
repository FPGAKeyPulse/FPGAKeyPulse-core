name: Publish Snapshot

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - name: Install system dependencies
        run: |
          dnf install -y \
            gcc-c++ \
            git \
            gzip \
            iverilog \
            make \
            tar \
            unzip \
            verilator \
            which \
            xz \
            zlib-devel \
            zstd

      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Run tests
        run: sbt -batch clean test

  publish-snapshot:
    name: Publish Snapshot
    runs-on: ubuntu-latest
    needs: test

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Publish snapshot to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: sbt -batch 'set ThisBuild / version := (ThisBuild / version).value.stripSuffix("-SNAPSHOT") + "-SNAPSHOT"' core/publish tester/publish
